name: Weekly Recommendation

on:
  schedule:
    - cron: '0 1 * * 1'  # Mondays 01:00 UTC (~08:00 WIB)
  workflow_dispatch:
    inputs:
      focus:
        description: 'Force a category (else AI picks best)'
        type: choice
        options: [auto, bug, feature, tutorial]
        default: auto

jobs:
  recommend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    concurrency:
      group: weekly-recommendation
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and check
        id: build
        continue-on-error: true
        run: |
          set +e
          npm run build > /tmp/build.log 2>&1
          EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          tail -c 6000 /tmp/build.log > /tmp/build-tail.log
          echo "Build exited with code ${EXIT_CODE}"

      - name: Install OpenCode CLI
        run: npm install -g opencode-ai@latest

      - name: Gather context and compose prompt
        uses: actions/github-script@v7
        env:
          BUILD_EXIT_CODE: ${{ steps.build.outputs.exit_code }}
          FOCUS: ${{ github.event.inputs.focus || 'auto' }}
        with:
          script: |
            const fs = require('fs')
            const { owner, repo } = context.repo

            // Collect existing issues for deduplication
            const listResp = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', per_page: 50
            })
            const existingTitles = listResp.data.map(function(i) { return i.title }).join('\n')

            let buildLog = '(no output captured)'
            try { buildLog = fs.readFileSync('/tmp/build-tail.log', 'utf8') } catch (e) {}
            const buildExitCode = process.env.BUILD_EXIT_CODE || '0'
            const focus = process.env.FOCUS || 'auto'

            const focusInstruction = focus !== 'auto'
              ? 'You MUST recommend a "' + focus + '" item — the category is forced by the caller.'
              : 'Pick whichever single category and topic will deliver the most value this week.'

            // Load the topics streams from src/data/topics.json
            let topicsText = '(could not read topics.json)'
            try { topicsText = fs.readFileSync('src/data/topics.json', 'utf8') } catch (e) {}

            const prompt =
              'You are a site reviewer and content advisor for the personal website of ' +
              'Dian Hanifudin Subhi (dhanifudin), a lecturer, cloud engineer, and backend developer ' +
              'based in Malang, Indonesia. The site is built with Astro 7 + Vue 3, styled to look ' +
              'like Neovim with the LazyVim distribution (Catppuccin theme), and is hosted at ' +
              'https://dhanifudin.github.io. ' +
              'Maintenance uses a GitHub IssueOps loop: the repo owner reviews your recommended ' +
              'issue and comments /plan to start implementation.\n\n' +
              'YOUR TASK: recommend the SINGLE most valuable improvement to file as ONE GitHub issue this week.\n' +
              focusInstruction + '\n\n' +
              'THREE LENSES (pick one):\n' +
              '  bug      — A real, concrete defect in the site. PREFER this if the build log ' +
              'below shows errors or warnings. Ground the issue in actual output — no speculation.\n' +
              '  feature  — Something a personal developer/academic site commonly has that this ' +
              'site lacks (e.g. RSS feed, sitemap, Open Graph meta, real search index backing the ' +
              'Telescope UI, tag/category pages, reading-time estimates, code-block copy buttons, ' +
              'print-friendly styles, PWA support, etc.).\n' +
              '  tutorial — A new blog post. Align to the topic streams in src/data/topics.json ' +
              '(shown below). Read src/content/blog/ to see what already exists and pick a topic ' +
              'not yet covered.\n\n' +
              'TOPIC STREAMS (src/data/topics.json):\n' +
              '<topics_json>\n' + topicsText + '\n</topics_json>\n\n' +
              'TO UNDERSTAND CURRENT STATE (read these files before deciding):\n' +
              '  src/content/blog/          — existing blog posts (titles, slugs, tags)\n' +
              '  src/content/projects/      — existing projects\n' +
              '  src/data/topics.json       — the 3 tutorial topic streams\n' +
              '  src/content.config.ts      — blog/project frontmatter schema\n\n' +
              'BUILD / ASTRO CHECK OUTPUT (exit code ' + buildExitCode + '):\n' +
              '<build_log>\n' + buildLog + '\n</build_log>\n\n' +
              'EXISTING ISSUE TITLES (do NOT create a near-duplicate of any of these):\n' +
              '<existing_issues>\n' + existingTitles + '\n</existing_issues>\n\n' +
              'OUTPUT RULES (strictly follow all):\n' +
              '  1. Output ONLY one raw JSON object — no markdown fences, no prose before or after.\n' +
              '  2. Do NOT edit any files, create branches, or open pull requests.\n' +
              '  3. JSON shape:\n' +
              '     {\n' +
              '       "category": "bug" | "feature" | "tutorial",\n' +
              '       "title": "<concise issue title, no leading slash, max 80 chars>",\n' +
              '       "body": "<markdown body — see requirements below>"\n' +
              '     }\n' +
              '  4. body requirements:\n' +
              '     - ## Problem / Opportunity  (what is wrong or missing, with evidence)\n' +
              '     - ## Why It Matters          (impact on visitors or site quality)\n' +
              '     - ## Acceptance Criteria     (markdown task checklist)\n' +
              '     - For tutorial issues also include:\n' +
              '       ## Suggested Outline       (H2 sections the post should cover)\n'

            fs.writeFileSync('/tmp/oc-prompt.txt', prompt)
            core.info('Prompt written (' + String(prompt.length) + ' chars), focus=' + focus + ', build_exit=' + buildExitCode)

      - name: Run OpenCode headless
        run: |
          opencode run "$(cat /tmp/oc-prompt.txt)" --model "${MODEL}" --agent plan \
            > /tmp/oc-out.txt 2>/tmp/oc-err.txt || true
          echo "=== OpenCode stdout ==="
          cat /tmp/oc-out.txt
          echo "=== OpenCode stderr (last 30 lines) ==="
          tail -30 /tmp/oc-err.txt || true
        env:
          OPENCODE_GO_API_KEY: ${{ secrets.OPENCODE_GO_API_KEY }}
          MODEL: ${{ vars.OPENCODE_RECOMMEND_MODEL || 'opencode-go/kimi-k2.7-code' }}

      - name: Create issue
        uses: actions/github-script@v7
        env:
          FOCUS: ${{ github.event.inputs.focus || 'auto' }}
        with:
          script: |
            const fs = require('fs')
            const { owner, repo } = context.repo
            const runUrl = 'https://github.com/' + owner + '/' + repo + '/actions/runs/' + String(context.runId)

            const raw = fs.readFileSync('/tmp/oc-out.txt', 'utf8')
            const stripped = raw.replace(/^```json\s*/m, '').replace(/^```\s*$/m, '').trim()
            const match = stripped.match(/\{[\s\S]*\}/)
            if (!match) {
              core.setFailed('OpenCode did not produce a valid JSON object.\nOutput:\n' + raw.slice(0, 3000))
              return
            }
            let rec
            try {
              rec = JSON.parse(match[0])
            } catch (e) {
              core.setFailed('JSON parse error: ' + e.message + '\nRaw:\n' + match[0].slice(0, 3000))
              return
            }

            const category = rec.category || ''
            const title = (rec.title || '').trim()
            const body = (rec.body || '').trim()
            if (!title || !body) {
              core.setFailed('Recommendation is missing title or body. Got: ' + JSON.stringify(rec).slice(0, 500))
              return
            }

            // Dedup: normalise titles and skip near-duplicates
            const listResp = await github.rest.issues.listForRepo({
              owner, repo, state: 'all', per_page: 50
            })
            function norm(s) {
              return s.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim()
            }
            const normTitle = norm(title)
            const dup = listResp.data.find(function(i) { return norm(i.title) === normTitle })
            if (dup) {
              core.info('Skipping — near-duplicate already exists: #' + String(dup.number) + ' ' + dup.title)
              return
            }

            // Map category to GitHub labels
            const catMap = { bug: 'bug', feature: 'enhancement', tutorial: 'documentation' }
            const validCats = Object.keys(catMap)
            const cat = validCats.indexOf(category) !== -1 ? category : 'feature'
            const labels = [catMap[cat], 'automated']

            const footer =
              '\n\n---\n' +
              '<!-- weekly-recommendation -->\n' +
              '**Category:** `' + cat + '`\n\n' +
              '_Generated by the [weekly recommendation workflow](' + runUrl + '). ' +
              'A repo owner or collaborator can comment `/plan` on this issue to start implementation._'
            const fullBody = body + footer

            const created = await github.rest.issues.create({
              owner, repo, title, body: fullBody, labels
            })
            core.info('Issue created: #' + String(created.data.number) + ' — ' + created.data.html_url)

      - name: Report workflow failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const runUrl = 'https://github.com/' + owner + '/' + repo + '/actions/runs/' + String(context.runId)
            const today = new Date().toISOString().split('T')[0]
            await github.rest.issues.create({
              owner, repo,
              title: 'Weekly recommendation workflow failed on ' + today,
              body: 'The [weekly recommendation workflow](' + runUrl + ') failed.\n\n' +
                'Please review the logs and resolve the issue. ' +
                'A repo owner or collaborator can comment `/plan` on this issue to investigate.',
              labels: ['automated']
            })
